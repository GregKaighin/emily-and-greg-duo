<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Emily &amp; Greg Duo</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        :root {
            --gold:       #c9a96e;
            --gold-light: #e8c98a;
            --dark:       #0d0d0d;
            --dark-mid:   #131313;
            --dark-card:  #1a1a1a;
            --text:       #f0ece3;
            --text-muted: #888;
            --red:        #c0392b;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--dark);
            color: var(--text);
            font-family: 'Lato', 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        /* ── Login ── */
        #login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .login-box {
            background: var(--dark-card);
            border: 1px solid rgba(201,169,110,0.2);
            border-radius: 10px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        .login-box h1 {
            font-size: 1.1rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 0.3rem;
        }
        .login-box p { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1.5rem; }
        .field { margin-bottom: 0.9rem; text-align: left; }
        .field label { display: block; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.3rem; }
        .field input {
            width: 100%; padding: 0.65rem 0.9rem;
            background: #111; border: 1px solid #333; border-radius: 6px;
            color: var(--text); font-size: 0.95rem; outline: none;
            transition: border-color 0.2s;
        }
        .field input:focus { border-color: var(--gold); }
        .btn-gold {
            width: 100%; padding: 0.7rem; margin-top: 0.5rem;
            background: linear-gradient(135deg, #a07840, var(--gold));
            color: var(--dark); border: none; border-radius: 6px;
            font-weight: 700; font-size: 0.85rem; letter-spacing: 0.15em;
            text-transform: uppercase; cursor: pointer; transition: opacity 0.2s;
        }
        .btn-gold:hover { opacity: 0.85; }
        .error-msg { color: #e07070; font-size: 0.82rem; margin-top: 0.75rem; min-height: 1.2em; }

        /* ── Admin screen ── */
        #admin-screen { display: none; max-width: 860px; margin: 0 auto; padding: 2.5rem 1.5rem; }
        .admin-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 2rem; padding-bottom: 1rem;
            border-bottom: 1px solid rgba(201,169,110,0.2);
        }
        .admin-header h1 { font-size: 1.2rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); }
        .btn-logout {
            background: transparent; border: 1px solid #555; border-radius: 6px;
            color: var(--text-muted); font-size: 0.78rem; letter-spacing: 0.1em;
            text-transform: uppercase; padding: 0.4rem 0.9rem; cursor: pointer; transition: all 0.2s;
        }
        .btn-logout:hover { border-color: var(--gold); color: var(--gold); }

        /* ── Add gig form ── */
        .add-form-box {
            background: var(--dark-card); border: 1px solid rgba(201,169,110,0.15);
            border-radius: 10px; padding: 1.5rem; margin-bottom: 2rem;
        }
        .add-form-box h2 { font-size: 0.85rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.2rem; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
        @media (max-width: 560px) { .form-grid { grid-template-columns: 1fr; } }
        .form-grid .field-full { grid-column: 1 / -1; }
        .add-form-box .field input {
            background: #0d0d0d; border: 1px solid #2a2a2a;
            color: var(--text); border-radius: 6px; padding: 0.6rem 0.8rem;
            font-size: 0.9rem; width: 100%; outline: none; transition: border-color 0.2s;
        }
        .add-form-box .field input:focus { border-color: var(--gold); }
        .btn-add {
            margin-top: 0.5rem; padding: 0.6rem 1.8rem;
            background: linear-gradient(135deg, #a07840, var(--gold));
            color: var(--dark); border: none; border-radius: 6px;
            font-weight: 700; font-size: 0.8rem; letter-spacing: 0.15em;
            text-transform: uppercase; cursor: pointer; transition: opacity 0.2s;
        }
        .btn-add:hover { opacity: 0.85; }

        /* ── Gigs list ── */
        .gigs-list-box h2 { font-size: 0.85rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; }
        .admin-gig-row {
            display: flex; align-items: center; justify-content: space-between; gap: 1rem;
            padding: 0.9rem 1rem; border-radius: 8px; margin-bottom: 0.5rem;
            background: var(--dark-card); border: 1px solid rgba(201,169,110,0.1);
        }
        .admin-gig-past { opacity: 0.45; }
        .admin-gig-info { display: flex; flex-wrap: wrap; gap: 0.4rem 1rem; align-items: center; }
        .admin-gig-date { color: var(--gold); font-weight: 700; font-size: 0.88rem; }
        .admin-gig-venue { color: var(--text); font-size: 0.9rem; }
        .admin-gig-meta { color: var(--text-muted); font-size: 0.8rem; }
        .admin-past-badge {
            font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase;
            background: rgba(255,255,255,0.06); border-radius: 20px;
            padding: 0.15rem 0.5rem; color: var(--text-muted);
        }
        .admin-delete-btn {
            flex-shrink: 0; padding: 0.35rem 0.8rem;
            background: transparent; border: 1px solid #c0392b;
            color: #c0392b; border-radius: 5px; font-size: 0.75rem;
            letter-spacing: 0.05em; text-transform: uppercase;
            cursor: pointer; transition: all 0.2s;
        }
        .admin-delete-btn:hover { background: #c0392b; color: #fff; }
        .admin-delete-btn:disabled { opacity: 0.4; cursor: default; }
        .admin-empty { color: var(--text-muted); font-size: 0.9rem; }
        select {
            width: 100%; padding: 0.6rem 0.8rem;
            background: #0d0d0d; border: 1px solid #2a2a2a;
            color: var(--text); border-radius: 6px;
            font-size: 0.9rem; outline: none; transition: border-color 0.2s;
        }
        select:focus { border-color: var(--gold); }
        .act-badge {
            font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase;
            border-radius: 20px; padding: 0.15rem 0.55rem; font-weight: 600;
        }
        .act-badge.duo  { background: rgba(201,169,110,0.15); color: var(--gold); }
        .act-badge.joy  { background: rgba(212,132,158,0.15); color: #d4849e; }
        .act-badge.both { background: rgba(255,255,255,0.08); color: #aaa; }
    </style>
</head>
<body>

    <!-- ── Login ── -->
    <div id="login-screen">
        <div class="login-box">
            <h1>Emily &amp; Greg Duo</h1>
            <p>Admin login</p>
            <form id="login-form">
                <div class="field">
                    <label for="admin-email">Email</label>
                    <input type="email" id="admin-email" autocomplete="username" required>
                </div>
                <div class="field">
                    <label for="admin-password">Password</label>
                    <input type="password" id="admin-password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn-gold">Log In</button>
                <p class="error-msg" id="login-error"></p>
            </form>
        </div>
    </div>

    <!-- ── Admin screen ── -->
    <div id="admin-screen">
        <div class="admin-header">
            <h1>Gig Manager</h1>
            <button id="logout-btn" class="btn-logout">Log Out</button>
        </div>

        <!-- Add gig -->
        <div class="add-form-box">
            <h2>Add a Gig</h2>
            <form id="add-gig-form">
                <div class="form-grid">
                    <div class="field">
                        <label for="gig-date">Date *</label>
                        <input type="date" id="gig-date" required>
                    </div>
                    <div class="field">
                        <label for="gig-time">Time</label>
                        <input type="text" id="gig-time" placeholder="e.g. 7:00pm">
                    </div>
                    <div class="field field-full">
                        <label for="gig-venue">Venue *</label>
                        <input type="text" id="gig-venue" placeholder="e.g. The Assembly Rooms, Lincoln" required>
                    </div>
                    <div class="field field-full">
                        <label for="gig-details">Details (optional)</label>
                        <input type="text" id="gig-details" placeholder="e.g. Wedding reception — ticketed event">
                    </div>
                    <div class="field field-full">
                        <label for="gig-act">Act *</label>
                        <select id="gig-act" required>
                            <option value="Emily &amp; Greg Duo">Emily &amp; Greg Duo</option>
                            <option value="Emily Joy">Emily Joy</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-add">Add Gig</button>
                <p class="error-msg" id="add-error"></p>
            </form>
        </div>

        <!-- Gigs list -->
        <div class="gigs-list-box">
            <h2>All Gigs</h2>
            <div id="admin-gigs-list"></div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
