<!DOCTYPE html>
<html>
<head>
<style>
  body { background:#0d0d0d; color:#f0ece3; font-family:sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; margin:0; gap:1.5rem; }
  h2 { color:#c9a96e; margin:0; letter-spacing:0.1em; }
  p  { color:#888; margin:0; font-size:0.9rem; }
  #status { color:#c9a96e; font-size:0.85rem; }
  #notes  { display:flex; gap:1rem; }
  .note-box {
    width:120px; height:90px; border:1px solid #333; border-radius:8px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:0.3rem; background:#1a1a1a;
  }
  .note-box .name { font-size:1.6rem; color:#c9a96e; font-weight:700; }
  .note-box .freq { font-size:0.75rem; color:#888; }
  .note-box .num  { font-size:0.7rem;  color:#555; }
  .note-box.active { border-color:#c9a96e; background:#221a0d; }
  #captured { color:#aaa; font-size:0.8rem; font-family:monospace; background:#111; padding:0.75rem 1.5rem; border-radius:8px; }
</style>
</head>
<body>
<h2>MIDI Note Capture</h2>
<p>Play three notes on your keyboard — they'll appear below</p>
<div id="status">Waiting for MIDI access…</div>
<div id="notes">
  <div class="note-box" id="n0"><span class="name">–</span><span class="freq"></span><span class="num"></span></div>
  <div class="note-box" id="n1"><span class="name">–</span><span class="freq"></span><span class="num"></span></div>
  <div class="note-box" id="n2"><span class="name">–</span><span class="freq"></span><span class="num"></span></div>
</div>
<div id="captured">Play notes to capture frequencies…</div>
<button onclick="clearNotes()" style="background:#333;color:#c9a96e;border:1px solid #c9a96e;border-radius:6px;padding:0.4rem 1.2rem;cursor:pointer;font-size:0.85rem;">Clear</button>

<script>
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
let captured = [];

function midiToName(n)  { return NOTE_NAMES[n % 12] + Math.floor(n / 12 - 1); }
function midiToFreq(n)  { return (440 * Math.pow(2, (n - 69) / 12)).toFixed(2); }

function onNote(midiNum) {
    if (captured.length >= 3) return;
    const name = midiToName(midiNum);
    const freq = midiToFreq(midiNum);
    const idx  = captured.length;
    captured.push({ name, freq, midiNum });

    const box = document.getElementById('n' + idx);
    box.querySelector('.name').textContent = name;
    box.querySelector('.freq').textContent = freq + ' Hz';
    box.querySelector('.num').textContent  = 'MIDI ' + midiNum;
    box.classList.add('active');

    document.getElementById('captured').textContent =
        captured.map(n => `${n.name}: ${n.freq} Hz`).join('   |   ');
}

function clearNotes() {
    captured = [];
    [0,1,2].forEach(i => {
        const b = document.getElementById('n' + i);
        b.querySelector('.name').textContent = '–';
        b.querySelector('.freq').textContent = '';
        b.querySelector('.num').textContent  = '';
        b.classList.remove('active');
    });
    document.getElementById('captured').textContent = 'Play notes to capture frequencies…';
}

navigator.requestMIDIAccess().then(midi => {
    document.getElementById('status').textContent = '✓ MIDI connected — play your three notes';
    midi.inputs.forEach(input => {
        input.onmidimessage = e => {
            const [status, note, velocity] = e.data;
            if ((status & 0xf0) === 0x90 && velocity > 0) onNote(note);
        };
    });
    midi.onstatechange = e => {
        if (e.port.type === 'input' && e.port.state === 'connected') {
            e.port.onmidimessage = ev => {
                const [status, note, velocity] = ev.data;
                if ((status & 0xf0) === 0x90 && velocity > 0) onNote(note);
            };
        }
    };
}).catch(() => {
    document.getElementById('status').textContent = '⚠ MIDI not available — try Chrome or Edge';
});
</script>
</body>
</html>
