<!DOCTYPE html>
<html>
<head>
<style>
  body { background:#0d0d0d; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; font-family:sans-serif; }
  button { background:linear-gradient(135deg,#a07840,#c9a96e); color:#0d0d0d; border:none; border-radius:8px; padding:1rem 2.5rem; font-size:1.1rem; font-weight:700; cursor:pointer; letter-spacing:0.1em; }
  button:hover { opacity:0.85; }
</style>
</head>
<body>
<button onclick="play()">▶ Play Chime</button>
<script>
function play() {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const ac = new AudioCtx();
    [[329.63,0.00,0.20,2.2],[493.88,0.30,0.16,2.0],[392.00,0.52,0.22,3.0]].forEach(([freq,delay,peak,decay]) => {
        const osc = ac.createOscillator(), gain = ac.createGain();
        const osc2 = ac.createOscillator(), gain2 = ac.createGain();
        osc2.type = 'triangle'; osc2.frequency.value = freq; gain2.gain.value = 0.3;
        osc2.connect(gain2); gain2.connect(gain);
        osc.connect(gain); gain.connect(ac.destination);
        osc.type = 'sine'; osc.frequency.value = freq;
        const t = ac.currentTime + delay;
        gain.gain.setValueAtTime(0,t);
        gain.gain.linearRampToValueAtTime(peak, t+0.015);
        gain.gain.exponentialRampToValueAtTime(0.001, t+decay);
        osc.start(t); osc.stop(t+decay);
        osc2.start(t); osc2.stop(t+decay);
    });
}
</script>
</body>
</html>
